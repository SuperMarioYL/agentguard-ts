name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Test
        run: npm test

      # Dogfood: AgentGuard scans its own tree. The bundled jqwik fixture is a
      # known HIGH, so we scan with --no-deps and allow the expected exit code.
      - name: Self-scan (informational)
        run: node dist/cli.js scan . --ci --no-deps || true
