name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  npm-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball into dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload package to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
