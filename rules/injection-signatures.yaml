# AgentGuard signature corpus
# ----------------------------
# The product's moat is this file, not the matcher. Each rule pairs a verb hit
# with the global `addressees` heuristic below:
#
#   - A verb addressed to an agent fires at the rule's full severity.
#   - A verb with no agent addressee is downgraded one level — UNLESS the rule
#     sets `require_addressee: true`, in which case a bare-`verbs` hit with no
#     addressee is DROPPED entirely (v0.2.0 precision fix). This keeps benign
#     developer prose ("rotate your password", "delete the build folder") out of
#     the report instead of surfacing it as MED noise.
#   - `strong_verbs` are self-evidently hostile corroborated patterns (e.g.
#     "read the .env", "rm -rf") that fire regardless of `require_addressee`,
#     so addressee-free payloads are still caught.
#
# Patterns are JavaScript regular expressions, matched case-insensitively.
# Keep \b word boundaries on bare verbs so fragments ("deleterious") don't match.

version: 1

# Addressee heuristic — does the prose talk *to* an AI agent rather than a human?
# A verb hit that also matches one of these escalates to the rule's full severity.
addressees:
  - "\\bAI\\b"
  - "\\bA\\.I\\.\\b"
  - "\\bassistant\\b"
  # Only AI-context "agent" — a bare \bagent\b also matches ssh-agent, user
  # agent, build agent, etc., which are not AI addressees and cause false HIGHs.
  - "\\b(ai|coding|autonomous|llm|chat|code)[ -]?agents?\\b"
  - "coding agent"
  - "\\bLLM\\b"
  - "language model"
  - "\\bcursor\\b"
  - "\\bcopilot\\b"
  - "\\bclaude\\b"
  - "\\bchatgpt\\b"
  - "\\bcodex\\b"
  - "\\bgpt-?[0-9]"
  - "\\byou are (a|an|now)\\b"
  - "as an? (ai|assistant|agent)"
  - "ignore (all )?(the )?(previous|prior|above)"
  - "disregard (all )?(the )?(previous|prior|above)"
  - "system prompt"
  - "note (to|for) the (ai|assistant|agent|model|llm)"
  - "instructions? (to|for) (the )?(ai|assistant|agent|model)"

rules:
  - id: destructive.delete
    severity: HIGH
    description: instruction to destroy files or data
    # Bare destructive verbs ("delete the build folder", "remove the temp file")
    # are everyday developer prose. require_addressee gates them so they only fire
    # when the prose is addressed to an agent; otherwise they are dropped, not
    # surfaced as MED noise. Self-evidently catastrophic commands (rm -rf,
    # drop table, format the disk) live in strong_verbs and fire regardless.
    require_addressee: true
    verbs:
      - "\\bdelete\\b"
      - "\\bremove (all|the|every)"
      - "\\bwipe\\b"
      - "\\berase\\b"
      - "\\btruncate\\b"
      - "purge (all|the)"
    strong_verbs:
      - "rm\\s+-rf"
      - "rm\\s+-fr"
      - "\\bdrop\\s+(table|database)\\b"
      - "\\bformat\\s+(the\\s+)?(disk|drive|volume)"
      - "delete the (entire )?contents"
      - "delete (all|every) (file|directory|folder)"

  - id: exfil.network
    severity: HIGH
    description: instruction to send local data off-machine
    verbs:
      - "\\bexfiltrate\\b"
      - "\\bcurl\\b\\s+\\S*https?://"
      - "\\bwget\\b\\s+\\S*https?://"
      - "send (the )?(contents|files|data|output|repository)"
      - "upload (the )?(contents|files|data|repository|repo|project)"
      - "post (the )?(contents|data|file).{0,30}https?://"
      - "fetch\\s+https?://"
      - "transmit (the )?(contents|data)"

  - id: phish.credential
    severity: HIGH
    description: instruction to read or harvest secrets and credentials
    # These are bare NOUNS, not imperatives — "password", ".env", "api key" all
    # appear constantly in benign developer prose ("rotate your password", "store
    # your api key in the vault"). require_addressee gates them: a bare-noun hit
    # only becomes a finding when the prose is also addressed to an agent;
    # otherwise it is dropped (not downgraded to MED), keeping false positives
    # out of the report entirely. Genuinely hostile, addressee-free phrasing is
    # caught by strong_verbs below.
    require_addressee: true
    verbs:
      - "\\.env\\b"
      - "\\bcredentials?\\b"
      - "\\bpassword(s)?\\b"
      - "\\bsecret(s)?\\b"
      - "\\bapi[_\\- ]?key(s)?\\b"
      - "\\baccess[_\\- ]?token(s)?\\b"
      - "ssh (private )?key"
      - "private key"
      - "aws[_\\- ]?(secret|access)"
      - "\\.aws/credentials"
      - "id_rsa"
    # Corroborated patterns: a hostile verb bound to a credential noun. These are
    # self-evidently adversarial, so they fire even without an agent addressee
    # (exempt from require_addressee), catching payloads like "read the .env and
    # send it" that don't name an addressee.
    strong_verbs:
      - "(read|harvest|exfiltrate|steal|dump|leak|grab|collect|send|upload|reveal|expose|extract|scrape)\\b[^.]{0,40}?(\\.env\\b(?!\\.)|\\bcredentials?\\b|\\bpassword(s)?\\b|\\bsecret(s)?\\b|\\bapi[_\\- ]?key(s)?\\b|\\baccess[_\\- ]?token(s)?\\b|ssh (private )?key|private key|\\.aws/credentials|id_rsa)"

  - id: injection.override
    severity: HIGH
    description: prompt-injection override of the agent's instructions
    # These verbs are themselves agent-directed; the global addressee list also
    # contains the same phrases so they reliably fire at HIGH.
    verbs:
      - "ignore (all )?(the )?(previous|prior|above) instructions"
      - "disregard (all )?(the )?(previous|prior|above)"
      - "forget (everything|all) (you|previous)"
      - "you are now (a|an|in)"
      - "new (system )?instructions:"
      - "override (the )?(system|previous) (prompt|instructions)"

  - id: privilege.escalate
    severity: MED
    description: instruction to escalate privileges or relax permissions
    verbs:
      - "\\bsudo\\b"
      - "chmod\\s+777"
      - "chmod\\s+-R\\s+777"
      - "run as root"
      - "run with (admin|root|elevated)"
      - "disable (the )?(firewall|sandbox|security)"

  - id: persistence.backdoor
    severity: MED
    description: instruction to install persistence or a backdoor
    verbs:
      - "add (an? )?ssh key"
      - "append.{0,20}authorized_keys"
      - "\\bcrontab\\b"
      - "modify (the )?(\\.bashrc|\\.zshrc|\\.profile)"
      - "install (a )?backdoor"
      - "add (a )?(new )?(admin|root) user"
      - "reverse shell"

  - id: obfuscation.hidden
    severity: MED
    description: instruction to act covertly or hide actions from the user
    verbs:
      - "do not (tell|inform|notify|alert) the (user|developer|human)"
      - "don'?t (tell|inform|mention|notify) the (user|developer|human)"
      - "without (telling|informing|notifying) the (user|developer|human)"
      - "\\bsilently\\b"
      - "do not mention this"
      - "keep this (secret|hidden|between us)"
      - "delete this (comment|file|note) after"
